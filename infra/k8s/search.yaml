apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: coworking-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: search
          image: coworking-ai/search:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: coworking-config
            - secretRef:
                name: coworking-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: coworking-ai
spec:
  selector:
    app: search
  ports:
    - port: 8001
      targetPort: 8001

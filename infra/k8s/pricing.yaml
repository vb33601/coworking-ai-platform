apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing
  namespace: coworking-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing
  template:
    metadata:
      labels:
        app: pricing
    spec:
      containers:
        - name: pricing
          image: coworking-ai/pricing:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: coworking-config
            - secretRef:
                name: coworking-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: pricing
  namespace: coworking-ai
spec:
  selector:
    app: pricing
  ports:
    - port: 8002
      targetPort: 8002

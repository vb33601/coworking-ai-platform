global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
  - job_name: 'search'
    static_configs:
      - targets: ['search:8001']
  - job_name: 'pricing'
    static_configs:
      - targets: ['pricing:8002']

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # Lint & Test
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [orchestrator, gateway, search, pricing]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.service != 'frontend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: matrix.service != 'frontend'
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-asyncio black isort flake8 mypy

      - name: Lint
        if: matrix.service != 'frontend'
        run: |
          black --check services/${{ matrix.service }}/app
          isort --check-only services/${{ matrix.service }}/app
          flake8 services/${{ matrix.service }}/app --max-line-length=120

      - name: Test
        if: matrix.service != 'frontend'
        run: |
          pytest services/${{ matrix.service }}/tests/ -v || true

      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Frontend
        if: matrix.service == 'frontend'
        run: |
          cd frontend && npm ci && npm run lint || true

  # Build & Push Images
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [orchestrator, gateway, search, pricing, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name coworking-ai-staging

      - name: Deploy to staging
        run: |
          kubectl set image deployment/orchestrator orchestrator=${{ env.IMAGE_PREFIX }}/orchestrator:${{ github.sha }} -n coworking-ai-staging
          kubectl set image deployment/gateway gateway=${{ env.IMAGE_PREFIX }}/gateway:${{ github.sha }} -n coworking-ai-staging
          kubectl set image deployment/search search=${{ env.IMAGE_PREFIX }}/search:${{ github.sha }} -n coworking-ai-staging
          kubectl set image deployment/pricing pricing=${{ env.IMAGE_PREFIX }}/pricing:${{ github.sha }} -n coworking-ai-staging
          kubectl set image deployment/frontend frontend=${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }} -n coworking-ai-staging
          kubectl rollout status deployment/orchestrator -n coworking-ai-staging
          kubectl rollout status deployment/gateway -n coworking-ai-staging

  # Deploy to Production
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name coworking-ai-production

      - name: Deploy to production
        run: |
          kubectl set image deployment/orchestrator orchestrator=${{ env.IMAGE_PREFIX }}/orchestrator:${{ github.sha }} -n coworking-ai
          kubectl set image deployment/gateway gateway=${{ env.IMAGE_PREFIX }}/gateway:${{ github.sha }} -n coworking-ai
          kubectl set image deployment/search search=${{ env.IMAGE_PREFIX }}/search:${{ github.sha }} -n coworking-ai
          kubectl set image deployment/pricing pricing=${{ env.IMAGE_PREFIX }}/pricing:${{ github.sha }} -n coworking-ai
          kubectl set image deployment/frontend frontend=${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }} -n coworking-ai
          kubectl rollout status deployment/orchestrator -n coworking-ai
          kubectl rollout status deployment/gateway -n coworking-ai

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployed to production: ${{ github.sha }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
